name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm install
      - run: npm run build
      - run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions
        run: |
          npm version ${{ inputs.version }} --workspaces --no-git-tag-version
          npm version ${{ inputs.version }} --no-git-tag-version --include-workspace-root

      - name: Commit and tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git add -A
          git commit -m "release: v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Publish packages
        run: |
          npm publish --workspace=packages/build-tools --access public --provenance
          npm publish --workspace=packages/runtime --access public --provenance
          npm publish --workspace=packages/webpack-plugin --access public --provenance
          npm publish --workspace=packages/cli --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes
